name: Render Video Pipeline

on:
  workflow_dispatch:
    inputs:
      payload_base64:
        description: 'Base64 encoded campaign JSON payload'
        required: true
      profile:
        description: 'Render Profile (fast, preview, production)'
        required: false
        default: 'fast'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Data & Credentials
        run: |
          # 1. Decode the VSL JSON payload from the dashboard
          mkdir -p data
          echo "${{ github.event.inputs.payload_base64 }}" | base64 --decode > data/test-data.json
          
          # 2. Setup Google Cloud Credentials
          mkdir -p credentials
          echo '${{ secrets.GOOGLE_CLOUD_KEY }}' > credentials/google-cloud-key.json
          
          # 3. Setup .env file
          echo "GOOGLE_APPLICATION_CREDENTIALS=./credentials/google-cloud-key.json" >> .env
          echo "RENDER_PROFILE=${{ github.event.inputs.profile }}" >> .env
          echo "RENDER_CONCURRENCY=4" >> .env
          echo "DATA_FILE=./data/test-data.json" >> .env

      - name: Run pipeline (generate-all)
        run: npm run generate-all

      - name: Upload final video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.run_id }}
          path: final/*.mp4
          retention-days: 7

      - name: Upload run logs (on failure or success)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 3
